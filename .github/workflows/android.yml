name: Build Game
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Prepare and Build
        run: |
          mkdir -p jni/src
          cp main.cxx jni/src/main.cpp
          
          # ПРЯМЫЕ ССЫЛКИ (теперь точно скачается)
          curl -L https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-2.28.5.zip -o sdl2.zip
          curl -L https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-2.8.2.zip -o sdl_img.zip
          curl -L https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-2.22.0.zip -o sdl_ttf.zip
          
          unzip -q sdl2.zip && mv SDL2-2.28.5 jni/sdl2
          unzip -q sdl_img.zip && mv SDL2_image-2.8.2 jni/sdl2_image
          unzip -q sdl_ttf.zip && mv SDL2_ttf-2.22.0 jni/sdl2_ttf

          # Создаем структуру SDL2/ внутри инклудов
          for d in sdl2 sdl2_image sdl2_ttf; do
            mkdir -p jni/$d/include/SDL2
            cp jni/$d/include/*.h jni/$d/include/SDL2/ 2>/dev/null || true
          done

          # УЛЬТИМАТИВНЫЙ Android.mk (без системных путей)
          echo 'MY_DIR := $(CURDIR)/jni
          
          # Подключаем SDL2
          include $(MY_DIR)/sdl2/Android.mk
          
          # Подключаем SDL2_image
          LOCAL_PATH := $(MY_DIR)/sdl2_image
          include $(LOCAL_PATH)/Android.mk
          
          # Подключаем SDL2_ttf
          LOCAL_PATH := $(MY_DIR)/sdl2_ttf
          include $(LOCAL_PATH)/Android.mk
          
          # Твой модуль
          include $(CLEAR_VARS)
          LOCAL_MODULE := main
          LOCAL_SRC_FILES := jni/src/main.cpp
          LOCAL_C_INCLUDES := $(MY_DIR)/sdl2/include \
                              $(MY_DIR)/sdl2_image/include \
                              $(MY_DIR)/sdl2_ttf/include
          
          LOCAL_SHARED_LIBRARIES := SDL2 SDL2_image SDL2_ttf
          LOCAL_LDLIBS := -lGLESv2 -llog -landroid -lz
          LOCAL_CPPFLAGS := -std=c++17
          include $(BUILD_SHARED_LIBRARY)' > jni/Android.mk

          # Application.mk
          echo 'APP_ABI := arm64-v8a
          APP_PLATFORM := android-21
          APP_STL := c++_shared
          APP_ALLOW_MISSING_DEPS := true' > jni/Application.mk

          $ANDROID_NDK_ROOT/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-libs
          path: libs/arm64-v8a/*.so
