name: Super Final APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java & NDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: NDK Install
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Preparation
        run: |
          # 1. Качаем все библиотеки
          curl -L https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-2.28.5.zip -o sdl2.zip
          curl -L https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-2.8.2.zip -o sdl_img.zip
          curl -L https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-2.22.0.zip -o sdl_ttf.zip
          curl -L https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.0/SDL2_mixer-2.8.0.zip -o sdl_mixer.zip

          # Распаковываем во временные папки
          unzip -q sdl2.zip -d temp_sdl2
          unzip -q sdl_img.zip -d temp_sdl_img
          unzip -q sdl_ttf.zip -d temp_sdl_ttf
          unzip -q sdl_mixer.zip -d temp_sdl_mixer

          # 2. Создаем структуру проекта
          # Берем шаблон прямо из SDL
          SDL_PATH=$(find temp_sdl2 -maxdepth 2 -name "android-project" -type d | head -n 1)
          cp -r "$SDL_PATH" .
          mv android-project proj
          
          mkdir -p proj/app/src/main/jni/SDL2
          mkdir -p proj/app/src/main/jni/SDL2_image
          mkdir -p proj/app/src/main/jni/SDL2_ttf
          mkdir -p proj/app/src/main/jni/SDL2_mixer
          mkdir -p proj/app/src/main/jni/src

          # 3. ПЕРЕМЕЩАЕМ СОДЕРЖИМОЕ (убираем лишние вложенные папки)
          cp -r $(find temp_sdl2 -maxdepth 2 -name "include" -type d | head -n 1)/../* proj/app/src/main/jni/SDL2/ || true
          cp -r $(find temp_sdl_img -maxdepth 2 -name "Android.mk" -type f | head -n 1)/../* proj/app/src/main/jni/SDL2_image/ || true
          cp -r $(find temp_sdl_ttf -maxdepth 2 -name "Android.mk" -type f | head -n 1)/../* proj/app/src/main/jni/SDL2_ttf/ || true
          cp -r $(find temp_sdl_mixer -maxdepth 2 -name "Android.mk" -type f | head -n 1)/../* proj/app/src/main/jni/SDL2_mixer/ || true

          # Копируем твой код и ассеты
          cp main.cxx proj/app/src/main/jni/src/main.cpp
          mkdir -p proj/app/src/main/assets
          if [ -d "assets" ]; then cp -r assets/* proj/app/src/main/assets/; fi

          # 4. Пишем конфиги с правильными путями
          echo 'LOCAL_PATH := $(call my-dir)
          include $(LOCAL_PATH)/SDL2/Android.mk
          include $(LOCAL_PATH)/SDL2_image/Android.mk
          include $(LOCAL_PATH)/SDL2_ttf/Android.mk
          include $(LOCAL_PATH)/SDL2_mixer/Android.mk
          include $(CLEAR_VARS)
          LOCAL_MODULE := main
          LOCAL_SRC_FILES := src/main.cpp
          LOCAL_C_INCLUDES := $(LOCAL_PATH)/SDL2/include $(LOCAL_PATH)/SDL2_image $(LOCAL_PATH)/SDL2_ttf $(LOCAL_PATH)/SDL2_mixer
          LOCAL_SHARED_LIBRARIES := SDL2 SDL2_image SDL2_ttf SDL2_mixer
          LOCAL_LDLIBS := -lGLESv2 -llog -landroid -lz
          include $(BUILD_SHARED_LIBRARY)' > proj/app/src/main/jni/Android.mk

          echo "APP_ABI := arm64-v8a
          APP_PLATFORM := android-21
          APP_STL := c++_shared
          APP_ALLOW_MISSING_DEPS := true" > proj/app/src/main/jni/Application.mk

          # Правим Gradle, чтобы он видел NDK
          sed -i 's/abiFilters.*/abiFilters "arm64-v8a"/' proj/app/build.gradle

      - name: Build APK
        working-directory: ./proj
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YardBattle-Final-APK
          path: proj/app/build/outputs/apk/debug/*.apk
