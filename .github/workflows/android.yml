name: Debugger Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java & NDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: NDK Install
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Preparation
        run: |
          # Скачиваем всё
          curl -L https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-2.28.5.zip -o sdl2.zip
          unzip -q sdl2.zip && mv SDL2-2.28.5 SDL2
          curl -L https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-2.8.2.zip -o sdl_img.zip
          unzip -q sdl_img.zip && mv SDL2_image-2.8.2 SDL2_image
          curl -L https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-2.22.0.zip -o sdl_ttf.zip
          unzip -q sdl_ttf.zip && mv SDL2_ttf-2.22.0 SDL2_ttf
          curl -L https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.0/SDL2_mixer-2.8.0.zip -o sdl_mixer.zip
          unzip -q sdl_mixer.zip && mv SDL2_mixer-2.8.0 SDL2_mixer

          # Создаем проект
          cp -r SDL2/android-project .
          
          # Чистим и создаем папки (jni должна быть в app/src/main/)
          mkdir -p android-project/app/src/main/jni/src
          mkdir -p android-project/app/src/main/assets

          # Раскладываем код и ассеты
          cp main.cxx android-project/app/src/main/jni/src/main.cpp
          if [ -d "assets" ]; then cp -r assets/* android-project/app/src/main/assets/; fi

          # Переносим либы ВНУТРЬ jni
          mv SDL2 android-project/app/src/main/jni/
          mv SDL2_image android-project/app/src/main/jni/
          mv SDL2_ttf android-project/app/src/main/jni/
          mv SDL2_mixer android-project/app/src/main/jni/

          # Создаем Android.mk
          echo 'LOCAL_PATH := $(call my-dir)
          include $(LOCAL_PATH)/SDL2/Android.mk
          include $(LOCAL_PATH)/SDL2_image/Android.mk
          include $(LOCAL_PATH)/SDL2_ttf/Android.mk
          include $(LOCAL_PATH)/SDL2_mixer/Android.mk
          include $(CLEAR_VARS)
          LOCAL_MODULE := main
          LOCAL_SRC_FILES := src/main.cpp
          LOCAL_C_INCLUDES := $(LOCAL_PATH)/SDL2/include $(LOCAL_PATH)/SDL2_image $(LOCAL_PATH)/SDL2_ttf $(LOCAL_PATH)/SDL2_mixer
          LOCAL_SHARED_LIBRARIES := SDL2 SDL2_image SDL2_ttf SDL2_mixer
          LOCAL_LDLIBS := -lGLESv2 -llog -landroid -lz
          include $(BUILD_SHARED_LIBRARY)' > android-project/app/src/main/jni/Android.mk

          # Создаем Application.mk
          echo "APP_ABI := arm64-v8a
          APP_PLATFORM := android-21
          APP_STL := c++_shared" > android-project/app/src/main/jni/Application.mk

          # Правим Gradle (обязательно!)
          sed -i 's/abiFilters.*/abiFilters "arm64-v8a"/' android-project/app/build.gradle
          
          # Отладка: покажи нам, что получилось
          echo "--- СТРУКТУРА ПАПОК ДЛЯ ПРОВЕРКИ ---"
          ls -R android-project/app/src/main/jni/

      - name: Build APK
        working-directory: ./android-project
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --info

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: YardBattle-Final-APK
          path: android-project/app/build/outputs/apk/debug/*.apk
