name: Fixed Syntax APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java & NDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: NDK Install
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Preparation
        run: |
          # 1. Качаем SDL2
          curl -L https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-2.28.5.zip -o sdl2.zip
          unzip -q sdl2.zip
          
          # Находим путь к распакованной SDL2
          SDL_ROOT=$(pwd)/$(find . -maxdepth 1 -type d -name "SDL2-2.28.5")
          
          # 2. Создаем проект из шаблона
          cp -r "$SDL_ROOT/android-project" ./proj
          mkdir -p ./proj/app/src/main/jni/src
          
          # Копируем твой код
          cp main.cxx ./proj/app/src/main/jni/src/main.cpp
          
          # 3. Создаем Android.mk
          echo "LOCAL_PATH := \$(call my-dir)
          include \$(CLEAR_VARS)
          LOCAL_MODULE := main
          LOCAL_SRC_FILES := src/main.cpp
          LOCAL_SHARED_LIBRARIES := SDL2
          LOCAL_LDLIBS := -lGLESv2 -llog -landroid
          include \$(BUILD_SHARED_LIBRARY)
          \$(call import-module,.)" > ./proj/app/src/main/jni/Android.mk

          # 4. Создаем Application.mk
          echo "APP_ABI := arm64-v8a
          APP_PLATFORM := android-21
          APP_STL := c++_shared" > ./proj/app/src/main/jni/Application.mk

          # 5. ИСПРАВЛЕННЫЙ ФИКС GRADLE (Строка 29)
          # Мы заменяем блок конфигурации на правильный синтаксис
          sed -i "s/abiFilters.*/abiFilters 'arm64-v8a'\n                arguments 'NDK_MODULE_PATH=$SDL_ROOT'/" ./proj/app/build.gradle

      - name: Build APK
        working-directory: ./proj
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: YardBattle-Final-APK
          path: proj/app/build/outputs/apk/debug/*.apk
