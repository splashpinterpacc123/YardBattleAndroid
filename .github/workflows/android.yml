name: Ultimate YardBattle Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java & NDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: NDK Install
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Preparation
        run: |
          # 1. Скачиваем библиотеки (SDL2 и SDL_image)
          curl -L https://github.com/libsdl-org/SDL/releases/download/release-2.28.5/SDL2-2.28.5.zip -o sdl2.zip
          unzip -q sdl2.zip
          curl -L https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-2.8.2.zip -o sdl_img.zip
          unzip -q sdl_img.zip
          
          # Находим реальные пути к распакованным папкам
          SDL_SRC_DIR=$(pwd)/$(find . -maxdepth 1 -type d -name "SDL2-2.28.5")
          SDL_IMG_SRC_DIR=$(pwd)/$(find . -maxdepth 1 -type d -name "SDL2_image-2.8.2")
          
          # 2. Создаем структуру проекта из шаблона SDL
          cp -r "$SDL_SRC_DIR/android-project" ./proj
          
          # Очищаем jni и создаем правильные подпапки
          rm -rf ./proj/app/src/main/jni/*
          mkdir -p ./proj/app/src/main/jni/src
          mkdir -p ./proj/app/src/main/jni/SDL2
          mkdir -p ./proj/app/src/main/jni/SDL2_image
          mkdir -p ./proj/app/src/main/assets

          # 3. Копируем исходники библиотек в jni (чтобы NDK их точно видел)
          cp -r "$SDL_SRC_DIR"/* ./proj/app/src/main/jni/SDL2/
          cp -r "$SDL_IMG_SRC_DIR"/* ./proj/app/src/main/jni/SDL2_image/

          # Копируем твой код и ассеты
          cp main.cxx ./proj/app/src/main/jni/src/main.cpp
          if [ -d "assets" ]; then cp -r assets/* ./proj/app/src/main/assets/; fi

          # 4. Создаем Android.mk (Главная карта сборки)
          cat <<EOF > ./proj/app/src/main/jni/Android.mk
          LOCAL_PATH := \$(call my-dir)

          # Подключаем модули библиотек
          include \$(LOCAL_PATH)/SDL2/Android.mk
          include \$(LOCAL_PATH)/SDL2_image/Android.mk

          # Собираем твой основной модуль
          include \$(CLEAR_VARS)
          LOCAL_MODULE := main
          LOCAL_SRC_FILES := src/main.cpp
          LOCAL_C_INCLUDES := \$(LOCAL_PATH)/SDL2/include \$(LOCAL_PATH)/SDL2_image
          LOCAL_SHARED_LIBRARIES := SDL2 SDL2_image
          LOCAL_LDLIBS := -lGLESv2 -llog -landroid -lz
          include \$(BUILD_SHARED_LIBRARY)
          EOF

          # 5. Создаем Application.mk
          echo "APP_ABI := arm64-v8a
          APP_PLATFORM := android-21
          APP_STL := c++_shared" > ./proj/app/src/main/jni/Application.mk

          # 6. Пересоздаем build.gradle (убираем все ошибки 29 и 46 строк)
          cat <<EOF > ./proj/app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "org.libsdl.app"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.yourgame.yardbattle"
                  minSdkVersion 21
                  targetSdkVersion 34
                  externalNativeBuild {
                      ndkBuild {
                          abiFilters 'arm64-v8a'
                      }
                  }
              }
              externalNativeBuild {
                  ndkBuild {
                      path 'src/main/jni/Android.mk'
                  }
              }
          }
          EOF

      - name: Build APK
        working-directory: ./proj
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YardBattle-Final-APK
          path: proj/app/build/outputs/apk/debug/*.apk
